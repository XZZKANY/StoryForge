<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Test Agent WebSocket</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { color: #4CAF50; }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { background: #45a049; }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    #output {
      background: #2a2a2a;
      border: 1px solid #444;
      padding: 15px;
      margin-top: 20px;
      border-radius: 4px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    .info { color: #2196F3; }
    .warning { color: #ff9800; }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 4px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>StoryForge Desktop Agent WebSocket 测试</h1>

  <div>
    <label>API Base URL:</label>
    <input type="text" id="apiUrl" value="http://127.0.0.1:8000" />

    <label>API Key:</label>
    <input type="text" id="apiKey" value="local-dev-key" />

    <label>Session ID:</label>
    <input type="text" id="sessionId" value="test-session-001" />

    <label>用户消息:</label>
    <textarea id="userMessage" rows="3" placeholder="输入测试消息...">请解释一下 StoryForge 项目的结构</textarea>

    <label>Intent (可选):</label>
    <input type="text" id="intent" placeholder="chat.explain | file.revise | chapter.review" />
  </div>

  <div style="margin-top: 20px;">
    <button id="connectBtn">连接 WebSocket</button>
    <button id="sendBtn" disabled>发送消息</button>
    <button id="closeBtn" disabled>关闭连接</button>
    <button id="clearBtn">清空日志</button>
  </div>

  <div id="output"></div>

  <script>
    let socket = null;
    const output = document.getElementById('output');
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const closeBtn = document.getElementById('closeBtn');
    const clearBtn = document.getElementById('clearBtn');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${timestamp}] ${message}`;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function logJson(label, data) {
      log(`${label}:`, 'info');
      log(JSON.stringify(data, null, 2), 'info');
    }

    connectBtn.onclick = () => {
      const apiUrl = document.getElementById('apiUrl').value;
      const apiKey = document.getElementById('apiKey').value;
      const sessionId = document.getElementById('sessionId').value;

      if (!apiUrl || !apiKey || !sessionId) {
        log('请填写完整的连接参数', 'error');
        return;
      }

      // 构建 WebSocket URL
      const wsUrl = apiUrl.replace(/^http/, 'ws').replace(/\/+$/, '');
      const fullUrl = `${wsUrl}/api/ide/agent/sessions/${encodeURIComponent(sessionId)}?api_key=${encodeURIComponent(apiKey)}`;

      log(`正在连接: ${fullUrl}`, 'info');

      try {
        socket = new WebSocket(fullUrl);

        socket.onopen = () => {
          log('WebSocket 连接成功！', 'success');
          connectBtn.disabled = true;
          sendBtn.disabled = false;
          closeBtn.disabled = false;
        };

        socket.onmessage = (event) => {
          log('收到消息:', 'success');
          try {
            const data = JSON.parse(event.data);
            logJson('解析结果', data);

            // 特殊处理 agent_result
            if (data.type === 'agent_result') {
              log(`Intent: ${data.intent}`, 'success');
              log(`Plan 步骤数: ${data.plan?.length || 0}`, 'success');
              log(`Tool Trace 数: ${data.tool_trace?.length || 0}`, 'success');
              if (data.agent_result?.summary) {
                log(`摘要: ${data.agent_result.summary}`, 'success');
              }
            } else if (data.type === 'error') {
              log(`错误: ${data.detail}`, 'error');
            }
          } catch (e) {
            log('无法解析 JSON，原始数据:', 'warning');
            log(event.data, 'warning');
          }
        };

        socket.onerror = (error) => {
          log('WebSocket 错误:', 'error');
          console.error(error);
        };

        socket.onclose = (event) => {
          log(`WebSocket 已关闭 (code: ${event.code}, reason: ${event.reason || 'N/A'})`, 'warning');
          connectBtn.disabled = false;
          sendBtn.disabled = true;
          closeBtn.disabled = true;
          socket = null;
        };
      } catch (e) {
        log(`连接失败: ${e.message}`, 'error');
      }
    };

    sendBtn.onclick = () => {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        log('WebSocket 未连接', 'error');
        return;
      }

      const userMessage = document.getElementById('userMessage').value.trim();
      const intent = document.getElementById('intent').value.trim();

      if (!userMessage) {
        log('请输入用户消息', 'error');
        return;
      }

      const message = {
        type: 'user_message',
        user_message: userMessage,
        intent: intent || undefined,
        args: {}
      };

      log('发送消息:', 'info');
      logJson('消息内容', message);

      socket.send(JSON.stringify(message));
    };

    closeBtn.onclick = () => {
      if (socket) {
        log('正在关闭连接...', 'info');
        socket.close();
      }
    };

    clearBtn.onclick = () => {
      output.innerHTML = '';
    };

    // 初始日志
    log('WebSocket 测试工具已就绪', 'success');
    log('请点击"连接 WebSocket"按钮开始测试', 'info');
  </script>
</body>
</html>
