name: E2E

on:
  workflow_dispatch:
  # 每周一次契约/迁移漂移安全网（重 job：postgres/redis + 真实 HTTP），不压每个 PR。
  schedule:
    - cron: '0 18 * * 0'

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: storyforge
          POSTGRES_PASSWORD: storyforge
          POSTGRES_DB: storyforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyforge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://storyforge:storyforge@localhost:5432/storyforge
      REDIS_URL: redis://localhost:6379/0
      STORYFORGE_ENV: development
      STORYFORGE_API_KEY: ci-test-key
      STORYFORGE_API_BASE_URL: http://localhost:8000
      STORYFORGE_CORS_ORIGINS: http://localhost:3000
      STORYFORGE_LLM_PROVIDER: deterministic
      STORYFORGE_LLM_MODEL: storyforge-deterministic-writer
      STORYFORGE_EMBEDDING_PROVIDER: local
      STORYFORGE_EMBEDDING_MODEL: storyforge-fake-embedding
      STORYFORGE_RERANKER_PROVIDER: disabled
      WORKFLOW_RUNTIME_MODE: local
      WORKFLOW_CHECKPOINT_BACKEND: sqlite

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6

      - name: 安装 Node 依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 API 依赖
        working-directory: apps/api
        run: uv sync --frozen

      - name: 安装 Workflow 依赖
        working-directory: apps/workflow
        run: uv sync --frozen

      - name: 执行 Alembic 迁移预检
        working-directory: apps/api
        run: uv run pytest tests/test_alembic_heads.py -q

      - name: 执行数据库迁移
        working-directory: apps/api
        run: uv run alembic upgrade head

      - name: 运行 E2E
        run: pnpm e2e
