name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core-gate:
    name: Core verification
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6

      - name: 安装 Node 依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 API 依赖
        working-directory: apps/api
        run: uv sync --frozen

      - name: 安装 Workflow 依赖
        working-directory: apps/workflow
        run: uv sync --frozen

      # verify:local 含 lint + ruff + 三端单测 + OpenAPI 契约漂移检查
      # （scripts/verify-local.mjs 刷新 packages/shared/.../storyforge.openapi.json 后比对 sha256，
      #  漂移即 exit 1）。改了路由未跑 pnpm openapi 的 PR 会在此自动失败。
      - name: 执行本地核心门禁
        run: pnpm run verify:local
