name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core-gate:
    name: Core verification
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6

      - name: 安装 Node 依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 API 依赖
        working-directory: apps/api
        run: uv sync --frozen

      - name: 安装 Workflow 依赖
        working-directory: apps/workflow
        run: uv sync --frozen

      - name: 执行核心门禁
        run: pnpm run verify:ci
