# 生产覆盖配置：与 docker-compose.yml 合并后启用
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 关键差异：
# - 不向宿主机暴露 Postgres/Redis/MinIO 端口
# - 资源限制（mem/cpu）+ restart: always
# - json-file 日志驱动 + 大小封顶（max-size/max-file）
# - 通过 env_file 注入配置，真实 .env.production 存在时覆盖模板占位值

x-storyforge-logging: &storyforge-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '5'

x-storyforge-prod-env: &storyforge-prod-env
  - path: .env.production.example
    required: true
  - path: .env.production
    required: false

services:
  postgres:
    restart: always
    ports: !reset []
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'

  redis:
    restart: always
    ports: !reset []
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  minio:
    restart: always
    ports: !reset []
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  api:
    restart: always
    env_file: *storyforge-prod-env
    environment: !reset {}
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 1500m
          cpus: '1.5'
        reservations:
          memory: 512m
          cpus: '0.5'
      replicas: 1

  web:
    restart: always
    env_file: *storyforge-prod-env
    environment: !reset {}
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '1.0'

  workflow:
    restart: always
    env_file: *storyforge-prod-env
    environment: !reset {}
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'

  nginx:
    image: nginx:1.27-alpine
    container_name: storyforge-nginx
    restart: always
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'
    logging: *storyforge-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
