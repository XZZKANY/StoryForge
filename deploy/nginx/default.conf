# StoryForge Nginx 反向代理
#
# 路由规则：
#   /api/*          -> API 容器
#   /openapi.json   -> API（便于前端契约抓取）
#   /metrics        -> API（仅在内网访问时开放，建议生产再加 allow/deny 列表）
#   /docs, /redoc   -> API
#   /health/*       -> API（健康探针）
#   /*              -> API（Desktop IDE 是产品入口，不再代理 Web 页面）

upstream storyforge_api {
    server api:8000;
    keepalive 32;
}

# 静态资源缓存，避免重复回源。
map $sent_http_content_type $storyforge_immutable_cache {
    default "no-store";
    ~*^application/javascript "public, max-age=31536000, immutable";
    ~*^text/css               "public, max-age=31536000, immutable";
    ~*^image/                 "public, max-age=2592000";
    ~*^font/                  "public, max-age=31536000, immutable";
}

server {
    listen 80 default_server;
    server_name _;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 请求体大小限制
    client_max_body_size 16m;

    # 超时
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    send_timeout 120s;

    # 共享代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location = /health {
        proxy_pass http://storyforge_api;
    }

    location /health/ {
        proxy_pass http://storyforge_api;
    }

    location /api/ {
        proxy_pass http://storyforge_api;
    }

    location = /metrics {
        # 生产环境建议在外层 ALB/SG 限制来源，并在此处显式允许内网。
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1/32;
        deny all;
        proxy_pass http://storyforge_api;
    }

    location = /openapi.json {
        proxy_pass http://storyforge_api;
    }

    location /docs {
        proxy_pass http://storyforge_api;
    }

    location /redoc {
        proxy_pass http://storyforge_api;
    }

    location / {
        proxy_pass http://storyforge_api;
    }
}
