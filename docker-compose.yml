services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: storyforge-postgres
    environment:
      POSTGRES_DB: storyforge
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: storyforge
    ports:
      - "55432:5432"
    volumes:
      - storyforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyforge -d storyforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: storyforge-redis
    ports:
      - "6379:6379"
    volumes:
      - storyforge-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: storyforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: storyforge
      MINIO_ROOT_PASSWORD: storyforge-dev-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - storyforge-minio-data:/data

volumes:
  storyforge-postgres-data:
  storyforge-redis-data:
  storyforge-minio-data: